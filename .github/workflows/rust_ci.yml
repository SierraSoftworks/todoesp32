name: Continuous Integration

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Core (host)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt -p todoesp-core --check
      - name: Clippy
        run: cargo clippy -p todoesp-core --all-targets -- -D warnings
      - name: Test
        run: cargo test -p todoesp-core

  firmware:
    name: Firmware (xtensa-esp32)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust (Xtensa)
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32
          ldproxy: false
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware
      - name: Provide example config
        run: cp ./src/config.example.rs ./src/config.rs
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Clippy (on-device tests)
        run: cargo clippy --test integration -- -D warnings
      - name: Build (release)
        run: cargo build --release
